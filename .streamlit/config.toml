# Thème EcoSort-Search — design system repris du projet « suivi-ventes »
# (palette violette, mode clair par défaut ; le mode sombre est géré par
# les variables CSS de webapp/ui.py + le bouton de bascule de la navbar)

[theme]
base = "light"
primaryColor = "#5A3E85"
backgroundColor = "#F8F4FF"
secondaryBackgroundColor = "#F2ECFA"
textColor = "#2B2236"
font = "sans serif"

[theme.sidebar]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F2ECFA"
textColor = "#2B2236"
primaryColor = "#5A3E85"

[browser]
gatherUsageStats = false
