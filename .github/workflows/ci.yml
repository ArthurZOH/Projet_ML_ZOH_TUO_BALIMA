# CI EcoSort-Search : tests unitaires + validation du Dockerfile.
# Le build Docker s'exécute sur les serveurs GitHub : il valide la commande
# d'évaluation de l'enseignant (docker build + docker run -p 8501:8501)
# sans nécessiter Docker sur les machines des membres.
name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Tests unitaires
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image (commande de l'enseignant)
        run: docker build -t ecosort .
      - name: Smoke test — l'app démarre et répond
        run: |
          docker run -d -p 8501:8501 --name ecosort ecosort
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8501/_stcore/health; then exit 0; fi
            sleep 5
          done
          echo "L'app n'a jamais répondu sur le port 8501" >&2
          docker logs ecosort >&2
          exit 1
